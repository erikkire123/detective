<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UOF</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #060810;
    --surf:     #0C1018;
    --surf2:    #0F1520;
    --surf3:    #141C28;
    --border:   #1A2535;
    --border2:  #22304A;
    --accent:   #2460E8;
    --accent2:  #1A4FD0;
    --accentlo: rgba(36,96,232,0.15);
    --text:     #DDE4EE;
    --text2:    #7A94B0;
    --text3:    #3D5570;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
  }

  .page {
    max-width: 1160px;
    margin: 0 auto;
    padding: 36px 24px 80px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .hbadge {
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    padding: 5px 11px;
    border-radius: 3px;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .header .tagline {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } }

  /* ── Panel ── */
  .panel {
    background: var(--surf);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .panel-hd {
    padding: 11px 18px;
    background: var(--surf2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .panel-hd::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .panel-hd h2 {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text2);
    font-family: var(--mono);
  }
  .panel-body { padding: 20px 18px 22px; }

  /* ── Fields ── */
  .field { margin-bottom: 15px; }
  .field:last-of-type { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  .field input,
  .field textarea {
    width: 100%;
    background: var(--surf3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--accent);
    background: #111928;
  }
  .field input::placeholder,
  .field textarea::placeholder { color: var(--text3); }
  .field textarea { resize: vertical; min-height: 68px; }

  .img-row { display: flex; gap: 8px; align-items: stretch; }
  .img-row input { flex: 1; }
  .uplabel {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 15px;
    background: var(--surf3);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
    font-family: var(--mono);
    letter-spacing: 0.06em;
  }
  .uplabel:hover { border-color: var(--accent); color: var(--text); }
  #file-input { display: none; }

  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-gen {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
  }
  .btn-gen:hover { background: var(--accent2); }

  /* ── Preview ── */
  .preview-wrap {
    position: sticky;
    top: 24px;
  }
  .canvas-box {
    background: var(--surf2);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    padding: 20px;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 5px;
  }
  .preview-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    line-height: 2;
  }
  .statusbar {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 10px 16px;
    background: var(--surf2);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border2);
    border-radius: 0 0 8px 8px;
  }
  .sdot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    transition: background 0.4s;
    flex-shrink: 0;
  }
  .sdot.on { background: #22C55E; }
  .stext {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }

  .btn-dl {
    display: none;
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-dl:hover { border-color: var(--accent); color: var(--text); }
  .btn-dl.show { display: flex; }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="hbadge">UOF</div>
    <h1>ID Card Generator</h1>
    <span class="tagline">UNION OF FACTIONS // SECURE ISSUANCE SYSTEM</span>
  </header>

  <div class="layout">

    <aside>
      <div class="panel">
        <div class="panel-hd"><h2>Member Details</h2></div>
        <div class="panel-body">

          <div class="field">
            <label>Avatar Image</label>
            <div class="img-row">
              <input type="text" id="img-url" placeholder="Paste image URL…" />
              <label class="uplabel" for="file-input">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload
              </label>
              <input type="file" id="file-input" accept="image/*" />
            </div>
          </div>

          <div class="field">
            <label>Full Name / Handle</label>
            <input type="text" id="f-name" placeholder="JRM_1113 and dutch_vd1" />
          </div>

          <div class="field">
            <label>Department</label>
            <input type="text" id="f-dept" placeholder="Dept. of Inter-Faction Affairs" />
          </div>

          <div class="row2">
            <div class="field">
              <label>Faction Associated</label>
              <input type="text" id="f-faction" placeholder="JTTF" />
            </div>
            <div class="field">
              <label>Faction Rank</label>
              <input type="text" id="f-rank" placeholder="Director" />
            </div>
          </div>

          <div class="field">
            <label>Extra / Note</label>
            <textarea id="f-extra" placeholder="If Jordan isn't available try dming me"></textarea>
          </div>

          <div class="divider"></div>

          <div class="field">
            <label>Card Serial</label>
            <input type="text" id="f-serial" placeholder="VS-0002" />
          </div>

          <button class="btn-gen" onclick="generateCard()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
            Generate ID Card
          </button>

        </div>
      </div>
    </aside>

    <main class="preview-wrap">
      <div class="canvas-box">
        <div class="preview-empty" id="preview-hint">
          FILL IN MEMBER DETAILS<br>AND CLICK GENERATE
        </div>
        <canvas id="card-canvas" style="display:none;"></canvas>
      </div>
      <div class="statusbar">
        <div class="sdot" id="sdot"></div>
        <span class="stext" id="stext">AWAITING INPUT</span>
      </div>
      <button class="btn-dl" id="dl-btn" onclick="downloadCard()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </main>

  </div>
</div>

let uploadedDataURL = null;

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    uploadedDataURL = ev.target.result;
    const inp = document.getElementById('img-url');
    inp.value = '';
    inp.placeholder = '✓ ' + file.name;
  };
  r.readAsDataURL(file);
});

function setStatus(txt, on) {
  document.getElementById('stext').textContent = txt;
  document.getElementById('sdot').classList.toggle('on', on);
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '', lines = [];
  words.forEach(w => {
    const t = line ? line + ' ' + w : w;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
    else line = t;
  });
  lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function generateCard() {
  const name    = document.getElementById('f-name').value.trim()    || 'MEMBER NAME';
  const rank    = document.getElementById('f-rank').value.trim()    || 'RANK';
  const dept    = document.getElementById('f-dept').value.trim()    || 'Department';
  const faction = document.getElementById('f-faction').value.trim() || 'Faction';
  const extra   = document.getElementById('f-extra').value.trim();
  const serial  = document.getElementById('f-serial').value.trim()  || 'VS-0001';
  const imgUrl  = document.getElementById('img-url').value.trim();
  setStatus('RENDERING...', false);
  const src = uploadedDataURL || imgUrl || null;
  if (src) {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => draw(img, name, rank, dept, faction, extra, serial);
    img.onerror = () => draw(null, name, rank, dept, faction, extra, serial);
    img.src = src;
  } else {
    draw(null, name, rank, dept, faction, extra, serial);
  }
}

function draw(avatarImg, name, rank, dept, faction, extra, serial) {
  const W = 1000, H = 560;
  const canvas = document.getElementById('card-canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  /* ── base bg ── */
  ctx.fillStyle = '#060810';
  rr(ctx, 0, 0, W, H, 12); ctx.fill();

  /* ── grid overlay (very faint) ── */
  ctx.save();
  rr(ctx, 0, 0, W, H, 12); ctx.clip();
  ctx.strokeStyle = 'rgba(26,37,53,0.28)';
  ctx.lineWidth = 1;
  const G = 32;
  for (let x = 0; x <= W; x += G) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y <= H; y += G) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();

  /* ── main clip ── */
  ctx.save();
  rr(ctx, 0, 0, W, H, 12); ctx.clip();

  /* left accent stripe */
  ctx.fillStyle = '#2460E8';
  ctx.fillRect(0, 0, 5, H);

  /* ── header band ── */
  ctx.fillStyle = 'rgba(9,12,20,0.96)';
  ctx.fillRect(5, 0, W-5, 72);

  /* header bottom rule */
  ctx.strokeStyle = 'rgba(36,96,232,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(5, 72); ctx.lineTo(W, 72); ctx.stroke();

  /* org title */
  ctx.fillStyle = '#FFFFFF';
  ctx.font = '700 15px Inter, sans-serif';
  ctx.letterSpacing = '5px';
  ctx.fillText('UNION OF FACTIONS', 28, 30);
  ctx.letterSpacing = '0px';

  ctx.fillStyle = '#2A3E58';
  ctx.font = '400 10px "Share Tech Mono", monospace';
  ctx.letterSpacing = '2.5px';
  ctx.fillText('OFFICIAL IDENTIFICATION DOCUMENT  ·  RESTRICTED ISSUE', 28, 52);
  ctx.letterSpacing = '0px';

  /* serial top-right */
  ctx.fillStyle = '#2460E8';
  ctx.font = '500 15px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(serial, W - 24, 30);
  ctx.fillStyle = '#1E3050';
  ctx.font = '400 10px "Share Tech Mono", monospace';
  ctx.fillText('SECURE · VERIFIED', W - 24, 52);
  ctx.textAlign = 'left';

  /* ── avatar box ── */
  const AX = 28, AY = 92, AW = 240, AH = 296;

  /* photo bg */
  ctx.fillStyle = '#0A0F1A';
  ctx.strokeStyle = '#1A2535';
  ctx.lineWidth = 1;
  rr(ctx, AX, AY, AW, AH, 7); ctx.fill(); ctx.stroke();

  /* accent corner lines on photo */
  const clen = 20;
  ctx.strokeStyle = 'rgba(36,96,232,0.55)';
  ctx.lineWidth = 2;
  // top-left
  ctx.beginPath(); ctx.moveTo(AX+1, AY+clen); ctx.lineTo(AX+1, AY+1); ctx.lineTo(AX+clen, AY+1); ctx.stroke();
  // top-right
  ctx.beginPath(); ctx.moveTo(AX+AW-clen, AY+1); ctx.lineTo(AX+AW-1, AY+1); ctx.lineTo(AX+AW-1, AY+clen); ctx.stroke();
  // bottom-left
  ctx.beginPath(); ctx.moveTo(AX+1, AY+AH-clen); ctx.lineTo(AX+1, AY+AH-1); ctx.lineTo(AX+clen, AY+AH-1); ctx.stroke();
  // bottom-right
  ctx.beginPath(); ctx.moveTo(AX+AW-clen, AY+AH-1); ctx.lineTo(AX+AW-1, AY+AH-1); ctx.lineTo(AX+AW-1, AY+AH-clen); ctx.stroke();

  if (avatarImg) {
    ctx.save();
    rr(ctx, AX, AY, AW, AH, 7); ctx.clip();
    const ia = avatarImg.width / avatarImg.height;
    const ba = AW / AH;
    let sx=0, sy=0, sw=avatarImg.width, sh=avatarImg.height;
    if (ia > ba) { sw = avatarImg.height * ba; sx = (avatarImg.width - sw)/2; }
    else { sh = avatarImg.width / ba; sy = (avatarImg.height - sh)/2; }
    ctx.drawImage(avatarImg, sx, sy, sw, sh, AX, AY, AW, AH);
    ctx.restore();
  } else {
    ctx.fillStyle = '#0D1624';
    ctx.font = '700 60px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#1E2E45';
    ctx.fillText(name.substring(0,2).toUpperCase(), AX + AW/2, AY + AH/2 + 22);
    ctx.textAlign = 'left';
  }

  /* rank badge */
  const ry = AY + AH + 12;
  ctx.fillStyle = 'rgba(36,96,232,0.1)';
  ctx.strokeStyle = 'rgba(36,96,232,0.3)';
  ctx.lineWidth = 1;
  rr(ctx, AX, ry, AW, 32, 4); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#7BADF0';
  ctx.font = '600 12px "Share Tech Mono", monospace';
  ctx.letterSpacing = '4px';
  ctx.textAlign = 'center';
  ctx.fillText(rank.toUpperCase(), AX + AW/2, ry + 21);
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0px';

  /* UOF verified text (no icon) */
  ctx.fillStyle = '#253A52';
  ctx.font = '400 10px "Share Tech Mono", monospace';
  ctx.letterSpacing = '1.5px';
  ctx.fillText('UOF  ·  EST. 2026  ·  ID VERIFIED', AX, ry + 52);
  ctx.letterSpacing = '0px';

  /* ── info fields ── */
  const IX = 298, IY = 92, IW = W - IX - 28;

  function field(label, val, y, col) {
    /* label */
    ctx.fillStyle = '#253A52';
    ctx.font = '400 10px "Share Tech Mono", monospace';
    ctx.letterSpacing = '2.5px';
    ctx.fillText(label, IX, y);
    ctx.letterSpacing = '0px';

    /* value */
    ctx.fillStyle = col || '#DDE4EE';
    ctx.font = '600 26px Inter, sans-serif';
    const n = wrapText(ctx, val, IX, y + 32, IW, 32);

    /* separator */
    ctx.strokeStyle = '#151F2E';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(IX, y + 32 + n*32 + 12);
    ctx.lineTo(W - 28, y + 32 + n*32 + 12);
    ctx.stroke();

    return n;
  }

  let cy = IY;
  let n;
  n = field('NAME / HANDLE',       name,    cy, '#FFFFFF'); cy += 32 + n*32 + 30;
  n = field('DEPARTMENT',          dept,    cy, '#93C5FD'); cy += 32 + n*32 + 30;
  n = field('FACTION ASSOCIATED',  faction, cy, '#C4B5FD'); cy += 32 + n*32 + 30;

  if (extra) {
    ctx.fillStyle = '#1E3050';
    ctx.font = '400 10px "Share Tech Mono", monospace';
    ctx.letterSpacing = '2.5px';
    ctx.fillText('NOTE', IX, cy);
    ctx.letterSpacing = '0px';
    ctx.fillStyle = '#3A5470';
    ctx.font = '400 15px Inter, sans-serif';
    wrapText(ctx, extra, IX, cy + 22, IW, 21);
  }

function stampLogo() {
  const img = window._uofLogo;

  const scale = 0.5; // adjust size
  const LW = img.naturalWidth * scale;
  const LH = img.naturalHeight * scale;

  const LX = (W - LW) / 2 + 40;
  const LY = (H - LH) / 2 + 10;

  ctx.save();
  ctx.globalAlpha = 0.01;
  ctx.filter = 'grayscale(100%) brightness(1.4)';
  ctx.drawImage(img, LX, LY, LW, LH);
  ctx.restore();
}
  if (window._uofLogo && window._uofLogo.complete && window._uofLogo.naturalWidth > 0) {
    stampLogo();
  } else if (window._uofLogo) {
    window._uofLogo.onload = stampLogo;
  }

  /* ── footer ── */
  const FY = H - 48;
  ctx.fillStyle = 'rgba(8,10,18,0.97)';
  ctx.fillRect(5, FY, W-5, 48);

  ctx.strokeStyle = 'rgba(36,96,232,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(5, FY); ctx.lineTo(W, FY); ctx.stroke();

  ctx.fillStyle = '#1A2A3E';
  ctx.font = '400 10px "Share Tech Mono", monospace';
  ctx.letterSpacing = '1.8px';
  ctx.textAlign = 'center';
  ctx.fillText('UOF  //  UNION OF FACTIONS  ·  DEPT. OF INTER-FACTION AFFAIRS  ·  SECURE DOCUMENT', W/2, FY + 20);
  ctx.fillStyle = '#0F1C30';
  ctx.font = '400 9px "Share Tech Mono", monospace';
  ctx.fillText('THIS DOCUMENT IS THE PROPERTY OF THE UNION OF FACTIONS — UNAUTHORIZED USE IS PROHIBITED', W/2, FY + 36);
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0px';

  /* serial bottom-right */
  ctx.fillStyle = '#2460E8';
  ctx.font = '500 12px "Share Tech Mono", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(serial, W - 24, FY + 20);
  ctx.textAlign = 'left';

  /* ── corner tick marks ── */
  const tlen = 10;
  ctx.strokeStyle = 'rgba(36,96,232,0.5)';
  ctx.lineWidth = 1.5;
  [[12,12],[W-12,12],[12,H-12],[W-12,H-12]].forEach(([cx,cy2]) => {
    const dx = cx < W/2 ? 1 : -1;
    const dy = cy2 < H/2 ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(cx + dx*tlen, cy2); ctx.lineTo(cx, cy2); ctx.lineTo(cx, cy2 + dy*tlen); ctx.stroke();
  });

  ctx.restore();

  /* outer card border */
  ctx.strokeStyle = '#1A2535';
  ctx.lineWidth = 1;
  rr(ctx, 0, 0, W, H, 12); ctx.stroke();

  /* show */
  document.getElementById('preview-hint').style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('dl-btn').classList.add('show');
  setStatus('CARD READY  —  ' + serial, true);
}

function downloadCard() {
  const canvas = document.getElementById('card-canvas');
  const a = document.createElement('a');
  a.download = 'uof-id-' + (document.getElementById('f-serial').value.trim() || 'card') + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
